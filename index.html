<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Rules | LevelUp Town</title>
    
    <link rel="icon" href="LEVELUPTOWN.png" type="image/png">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

    <style>
        :root { --bg-color: #f4f4f4; --container-bg: #ffffff; --text-main: #111111; --border-color: #000000; --accent-color: #000000; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; overflow-y: scroll; }
        
        header { text-align: center; padding: 40px 20px; background-color: #fff; border-bottom: 4px solid #000; }
        .server-logo { max-width: 200px; margin-bottom: 20px; border: 3px solid #000; box-shadow: 5px 5px 0px #000; }
        .nav-bar { background-color: #000; padding: 12px 20px; display: flex; justify-content: flex-end; position: sticky; top: 0; z-index: 10; }
        .nav-bar button { background: transparent; color: #fff; border: 2px solid #fff; padding: 8px 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .nav-bar button:hover { background-color: #fff; color: #000; }
        
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        
        /* Grid Menu */
        .topic-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; animation: fadeIn 0.4s ease-in; }
        .topic-card { background: #fff; border: 2px solid #000; padding: 30px 20px; text-align: center; cursor: pointer; box-shadow: 4px 4px 0px #000; transition: 0.2s; }
        .topic-card:hover { transform: translateY(-5px); box-shadow: 8px 8px 0px #000; }
        .topic-card h3 { margin: 0; font-size: 1.4em; }
        
        /* Rule Display */
        .rule-content { display: none; background: #fff; border: 2px solid #000; padding: 30px; box-shadow: 6px 6px 0px #000; animation: fadeIn 0.3s ease-in; }
        .rule-content ul { padding-left: 20px; font-size: 1.1em; }
        .rule-content ul li { margin-bottom: 15px; }
        .rule-content ul li p { margin: 0; } 
        
        /* Admin Dashboard */
        #admin-view { display: none; background: #fff; border: 3px solid #000; padding: 30px; box-shadow: 8px 8px 0px #000; }
        .admin-section { background: #f9f9f9; padding: 20px; border: 2px dashed #ccc; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #000; font-size: 1em; }
        .btn-action { padding: 10px 15px; cursor: pointer; font-weight: bold; border: 2px solid #000; background: #000; color: #fff; transition: 0.2s; }
        .btn-action:hover { background: #333; }
        
        /* Quill */
        .ql-toolbar.ql-snow { border: 2px solid #000 !important; background: #eee; font-family: inherit; }
        .ql-container.ql-snow { border: 2px solid #000 !important; border-top: none !important; font-family: inherit; font-size: 1.1em; background: #fff; }
        
        /* Table */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; }
        th, td { border: 2px solid #000; padding: 10px; text-align: left; }
        th { background: #f0f0f0; }
        td p { margin: 0; } 
        .btn-edit { background: #ff9f43; color: #fff; border: 2px solid #000; padding: 6px 12px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .btn-delete { background: #ff4757; color: #fff; border: 2px solid #000; padding: 6px 12px; cursor: pointer; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="login-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:#fff; padding:40px; border:4px solid #000; width:350px; box-shadow: 8px 8px 0px rgba(255,255,255,0.2);">
            <h2 style="margin-top:0; border-bottom:2px solid #000; padding-bottom:10px; text-align:center;">🔒 Admin Login</h2>
            <div class="form-group"><label>Username</label><input type="text" id="input-user"></div>
            <div class="form-group"><label>Password</label><input type="password" id="input-pass"></div>
            <button class="btn-action" style="width:100%; margin-top:10px;" onclick="verifyLogin()">เข้าสู่ระบบ</button>
            <button style="width: 100%; margin-top:10px; padding:12px; border:2px solid #000; background:#ddd; cursor:pointer; font-weight:bold;" onclick="closeLogin()">ยกเลิก</button>
        </div>
    </div>

    <div class="nav-bar"><button id="toggleBtn" onclick="handleAuthClick()">เข้าสู่ระบบ Admin</button></div>

    <header>
        <img src="LEVELUPTOWN.png" alt="Logo" class="server-logo">
        <h1 style="margin:0; font-size:3em; text-transform:uppercase; font-weight:900;">LEVENUP TOWN</h1>
    </header>

    <div class="container">
        
        <!-- 1. เมนูหลัก -->
        <div id="main-menu" class="topic-grid"></div>

        <!-- 2. หน้าแสดงเนื้อหากฎ -->
        <div id="rule-display" class="rule-content">
            <button class="btn-action" style="margin-bottom:20px;" onclick="goBack()">◀ ย้อนกลับหน้าแรก</button>
            <h2 id="rule-title" style="border-bottom:2px solid #000; padding-bottom:10px; margin-top:0;"></h2>
            <ul id="rule-list"></ul>
        </div>

        <!-- 3. แผงควบคุมแอดมิน -->
        <div id="admin-view" class="admin-panel">
            <h2 style="margin-top:0; border-bottom:2px solid #000; padding-bottom:10px;">⚙️ แผงควบคุมแอดมิน</h2>
            
            <!-- ส่วนที่ 1: จัดการหมวดหมู่ -->
            <div class="admin-section" style="border-color:#3498db;">
                <h3 style="margin-top:0; color:#2980b9;">📁 จัดการหมวดหมู่กฎหมาย</h3>
                <div class="form-group">
                    <label>ชื่อหมวดหมู่ (ใส่ไอคอนอิโมจิได้)</label>
                    <input type="text" id="new-cat-name" placeholder="เช่น 🚗 กฎการขับรถ...">
                </div>
                <button id="btn-save-cat" class="btn-action" onclick="saveCategory()">+ เพิ่มหมวดหมู่ใหม่</button>
                <button id="btn-cancel-cat" onclick="cancelCatEdit()" style="display:none; padding:10px 15px; font-weight:bold; cursor:pointer; background:#ddd; border:2px solid #000;">ยกเลิก</button>
                
                <table>
                    <thead><tr><th style="width:75%;">รายชื่อหมวดหมู่</th><th style="width:25%; text-align:center;">จัดการ</th></tr></thead>
                    <tbody id="admin-cat-list"></tbody>
                </table>
            </div>

            <!-- ส่วนที่ 2: จัดการกฎหมายในแต่ละหมวด -->
            <div class="admin-section" style="border-color:#e67e22;">
                <h3 style="margin-top:0; color:#d35400;">📝 จัดการข้อกฎหมาย</h3>
                
                <div class="form-group">
                    <label>📂 เลือกหมวดหมู่ที่ต้องการจัดการ:</label>
                    <select id="admin-cat-filter" onchange="renderAdminRules()"></select>
                </div>

                <div class="form-group">
                    <label>ข้อความกฎ <span id="current-cat-label" style="color:gray;"></span></label>
                    <div id="editor-container" style="height: 150px;"></div>
                </div>
                <button id="btn-save-rule" class="btn-action" onclick="saveRule()">+ เพิ่มกฎลงในหมวดนี้</button>
                <button id="btn-cancel-rule" onclick="cancelRuleEdit()" style="display:none; padding:10px 15px; font-weight:bold; cursor:pointer; background:#ddd; border:2px solid #000;">ยกเลิกแก้ไข</button>
                
                <table>
                    <thead><tr><th style="width:75%;">เนื้อหากฎ</th><th style="width:25%; text-align:center;">จัดการ</th></tr></thead>
                    <tbody id="admin-rule-list"></tbody>
                </table>
            </div>

        </div>
    </div>

    <!-- Quill.js -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: 'พิมพ์ข้อกฎหมาย จัดสี ทำตัวหนาได้ที่นี่...',
            modules: { toolbar: [ ['bold', 'italic', 'underline', 'strike'], [{ 'color': [] }, { 'background': [] }], [{ 'align': [] }], ['clean'] ] }
        });

        // ==========================================
        // 1. ระบบข้อมูล และ การกู้คืนข้อมูลอัตโนมัติ
        // ==========================================
        const defaultCats = [
            { id: 'cat_1', name: '📜 กฎทั่วไป' },
            { id: 'cat_2', name: '🛡️ พื้นที่ปลอดภัย' },
            { id: 'cat_3', name: '🚓 กฎตำรวจ' },
            { id: 'cat_4', name: '🚑 กฎหมอ' },
            { id: 'cat_5', name: '🏛️ กฎสภา' },
            { id: 'cat_6', name: '🚨 หน่วยงานรัฐ' }
        ];

        let categories = JSON.parse(localStorage.getItem('levelUpCats')) || defaultCats;
        let rules = JSON.parse(localStorage.getItem('levelUpRules')) || [];
        
        // สคริปต์กู้คืนข้อมูลที่หายไป (Auto-Recovery)
        function recoverOldData() {
            let hasRecovered = false;

            // 1. กู้จากเวอร์ชันแรกสุด (serverRules)
            let oldServerRules = JSON.parse(localStorage.getItem('serverRules'));
            if (oldServerRules && oldServerRules.length > 0) {
                oldServerRules.forEach(r => {
                    let cid = 'cat_1';
                    if(r.cat === 'Safezone') cid = 'cat_2';
                    if(r.cat === 'Government') cid = 'cat_6';
                    
                    if(!rules.find(x => x.text === r.text || x.text === `<p>${r.text}</p>`)) {
                        rules.push({ catId: cid, text: `<p>${r.text}</p>` });
                        hasRecovered = true;
                    }
                });
                localStorage.removeItem('serverRules'); // ลบทิ้งเมื่อกู้เสร็จ
            }

            // 2. กู้จากเวอร์ชันที่ 2 (ข้อมูลแบบเก่าที่ใช้ cat แทน catId)
            let newRulesArray = [];
            rules.forEach(r => {
                if (r.catId) {
                    newRulesArray.push(r);
                } else if (r.cat) {
                    let cid = 'cat_1';
                    if(r.cat === 'Safezone') cid = 'cat_2';
                    if(r.cat === 'Police') cid = 'cat_3';
                    if(r.cat === 'Medic') cid = 'cat_4';
                    if(r.cat === 'Council') cid = 'cat_5';
                    if(r.cat === 'Government') cid = 'cat_6';
                    
                    // ห่อแท็ก p ให้เข้ากับระบบ Text Editor
                    let formattedText = r.text.includes('<p>') ? r.text : `<p>${r.text}</p>`;
                    newRulesArray.push({ catId: cid, text: formattedText });
                    hasRecovered = true;
                }
            });
            rules = newRulesArray;

            // ถ้าไม่มีข้อมูลเลย ให้ใส่ข้อมูลตั้งต้น
            if(rules.length === 0) {
                rules = [
                    { catId: 'cat_1', text: '<p>ห้ามใช้โปรแกรมช่วยเล่น บอท หรือการดัดแปลงไฟล์เกม</p>' },
                    { catId: 'cat_2', text: '<p>ห้ามก่ออาชญากรรมในพื้นที่ปลอดภัย</p>' }
                ];
                hasRecovered = true;
            }

            if (hasRecovered) {
                localStorage.setItem('levenUpRules', JSON.stringify(rules));
            }
        }
        
        // รันคำสั่งกู้คืนทันทีเมื่อโหลดเว็บ
        recoverOldData();

        let editCatIndex = -1;
        let editRuleIndex = -1;

        function saveData() {
            localStorage.setItem('levenUpCats', JSON.stringify(categories));
            localStorage.setItem('levenUpRules', JSON.stringify(rules));
            renderAll();
        }

        function getCatName(id) {
            const cat = categories.find(c => c.id === id);
            return cat ? cat.name : 'หมวดหมู่ถูกลบ';
        }

        // ==========================================
        // 2. ฟังก์ชันจัดการหมวดหมู่ (Categories)
        // ==========================================
        function saveCategory() {
            const name = document.getElementById('new-cat-name').value.trim();
            if(!name) return alert('กรุณาใส่ชื่อหมวดหมู่!');

            if(editCatIndex > -1) {
                categories[editCatIndex].name = name;
                alert('แก้ไขชื่อหมวดหมู่สำเร็จ!');
                cancelCatEdit();
            } else {
                const newId = 'cat_' + Date.now();
                categories.push({ id: newId, name: name });
            }
            document.getElementById('new-cat-name').value = '';
            saveData();
        }

        function editCategory(index) {
            editCatIndex = index;
            document.getElementById('new-cat-name').value = categories[index].name;
            document.getElementById('btn-save-cat').innerText = '💾 บันทึกชื่อหมวดหมู่';
            document.getElementById('btn-save-cat').style.background = '#3498db';
            document.getElementById('btn-cancel-cat').style.display = 'inline-block';
        }

        function cancelCatEdit() {
            editCatIndex = -1;
            document.getElementById('new-cat-name').value = '';
            document.getElementById('btn-save-cat').innerText = '+ เพิ่มหมวดหมู่ใหม่';
            document.getElementById('btn-save-cat').style.background = '#000';
            document.getElementById('btn-cancel-cat').style.display = 'none';
        }

        function deleteCategory(index) {
            if(confirm('⚠️ คำเตือน: หากลบหมวดหมู่นี้ กฎหมายทั้งหมดที่อยู่ในหมวดนี้จะหายไปด้วย!\nแน่ใจหรือไม่ที่จะลบ?')) {
                const catId = categories[index].id;
                rules = rules.filter(r => r.catId !== catId); 
                categories.splice(index, 1);
                
                if(editCatIndex === index) cancelCatEdit();
                saveData();
            }
        }

        // ==========================================
        // 3. ฟังก์ชันจัดการกฎ (Rules)
        // ==========================================
        function saveRule() {
            const catId = document.getElementById('admin-cat-filter').value; 
            if(!catId) return alert('กรุณาสร้างหมวดหมู่ก่อนเพิ่มกฎ!');

            const plainText = quill.getText().trim();
            const textHTML = quill.root.innerHTML;
            if(plainText.length === 0) return alert('กรุณากรอกข้อความกฎหมาย!');

            if(editRuleIndex > -1) {
                rules[editRuleIndex] = { catId, text: textHTML };
                alert('อัปเดตกฎสำเร็จ!');
                cancelRuleEdit(); 
            } else {
                rules.push({ catId, text: textHTML });
            }
            quill.setContents([]); 
            saveData();
        }

        function editRule(index) {
            editRuleIndex = index;
            const r = rules[index];
            
            document.getElementById('admin-cat-filter').value = r.catId;
            document.getElementById('current-cat-label').innerText = `(แก้ไขของ: ${getCatName(r.catId)})`;
            quill.root.innerHTML = r.text;
            
            document.getElementById('btn-save-rule').innerText = '💾 บันทึกการแก้ไขกฎ';
            document.getElementById('btn-save-rule').style.background = '#e67e22';
            document.getElementById('btn-cancel-rule').style.display = 'inline-block';
        }

        function cancelRuleEdit() {
            editRuleIndex = -1;
            quill.setContents([]); 
            document.getElementById('btn-save-rule').innerText = '+ เพิ่มกฎลงในหมวดนี้';
            document.getElementById('btn-save-rule').style.background = '#000';
            document.getElementById('btn-cancel-rule').style.display = 'none';
        }

        function deleteRule(index) {
            if(confirm('ลบกฎข้อนี้?')) {
                rules.splice(index, 1);
                if(editRuleIndex === index) cancelRuleEdit(); 
                saveData();
            }
        }

        // ==========================================
        // 4. ฟังก์ชัน Render หน้าจอ
        // ==========================================
        function renderAll() {
            const menu = document.getElementById('main-menu');
            menu.innerHTML = '';
            categories.forEach(c => {
                menu.innerHTML += `<div class="topic-card" onclick="openRule('${c.id}')"><h3>${c.name}</h3></div>`;
            });

            const catTbody = document.getElementById('admin-cat-list');
            catTbody.innerHTML = '';
            if(categories.length === 0) {
                catTbody.innerHTML = `<tr><td colspan="2" style="text-align:center; color:gray;">ยังไม่มีหมวดหมู่</td></tr>`;
            } else {
                categories.forEach((c, index) => {
                    catTbody.innerHTML += `<tr><td><strong>${c.name}</strong></td><td style="text-align:center;"><button class="btn-edit" onclick="editCategory(${index})">แก้ไข</button><button class="btn-delete" onclick="deleteCategory(${index})">ลบ</button></td></tr>`;
                });
            }

            const filter = document.getElementById('admin-cat-filter');
            const currentSelected = filter.value;
            filter.innerHTML = '';
            categories.forEach(c => {
                filter.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            });
            if(categories.find(c => c.id === currentSelected)) {
                filter.value = currentSelected; 
            }
            
            renderAdminRules(); 
        }

        function renderAdminRules() {
            const selectedCatId = document.getElementById('admin-cat-filter').value;
            document.getElementById('current-cat-label').innerText = selectedCatId ? `(เพิ่มลงใน: ${getCatName(selectedCatId)})` : '';

            const tbody = document.getElementById('admin-rule-list');
            tbody.innerHTML = ''; 
            let hasRules = false;

            rules.forEach((r, index) => {
                if(r.catId === selectedCatId) {
                    hasRules = true;
                    tbody.innerHTML += `<tr><td>${r.text}</td><td style="text-align:center;"><button class="btn-edit" onclick="editRule(${index})">แก้ไข</button><button class="btn-delete" onclick="deleteRule(${index})">ลบ</button></td></tr>`;
                }
            });

            if(!hasRules) tbody.innerHTML = `<tr><td colspan="2" style="text-align:center; color:gray;">ไม่มีกฎหมายในหมวดนี้</td></tr>`;
        }

        // ==========================================
        // 5. ระบบดูข้อมูลผู้เล่น & Login
        // ==========================================
        function openRule(catId) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('rule-display').style.display = 'block';
            document.getElementById('rule-title').innerText = getCatName(catId);
            
            const list = document.getElementById('rule-list');
            list.innerHTML = '';
            const filteredRules = rules.filter(r => r.catId === catId);
            
            if(filteredRules.length === 0) list.innerHTML = `<li style="color:gray; list-style:none;">ยังไม่มีข้อบังคับในหมวดหมู่นี้</li>`;
            else filteredRules.forEach(r => list.innerHTML += `<li>${r.text}</li>`);
        }

        function goBack() { 
            document.getElementById('rule-display').style.display = 'none';
            document.getElementById('main-menu').style.display = 'grid';
        }

        const adminAccounts = { "Newmeenoy": "New", "MJDEXN": "MJ", "YUYU": "Yu", "WH": "7731" };
        let isAdmin = false;
        
        function handleAuthClick() {
            if(isAdmin) { 
                isAdmin = false; 
                document.getElementById('admin-view').style.display = 'none'; 
                document.getElementById('rule-display').style.display = 'none'; 
                document.getElementById('main-menu').style.display = 'grid'; 
                document.getElementById('toggleBtn').innerText = 'เข้าสู่ระบบ Admin'; 
                cancelCatEdit(); cancelRuleEdit();
            } else { 
                document.getElementById('login-modal').style.display = 'flex'; 
                document.getElementById('input-user').value = ''; document.getElementById('input-pass').value = '';
            }
        }
        
        function verifyLogin() {
            const u = document.getElementById('input-user').value; const p = document.getElementById('input-pass').value;
            if(adminAccounts.hasOwnProperty(u) && adminAccounts[u] === p) {
                isAdmin = true;
                document.getElementById('login-modal').style.display = 'none';
                document.getElementById('main-menu').style.display = 'none';
                document.getElementById('rule-display').style.display = 'none';
                document.getElementById('admin-view').style.display = 'block';
                document.getElementById('toggleBtn').innerText = 'ออกจากระบบ Admin';
                renderAll(); 
            } else { alert('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง!'); }
        }
        function closeLogin() { document.getElementById('login-modal').style.display = 'none'; }

        renderAll();
    </script>
</body>
</html>
